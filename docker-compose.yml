version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: omnisight-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./omnisight
    container_name: omnisight-backend
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    env_file:
      - ./omnisight/.env
    volumes:
      - ./omnisight/data:/app/data

  frontend:
    build:
      context: ./omnisight-web
    container_name: omnisight-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - ./omnisight-web/.env.local

volumes:
  qdrant_data: